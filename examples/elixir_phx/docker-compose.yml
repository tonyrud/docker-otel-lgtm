---
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      OTEL_SERVICE_NAME: "elixir-phx-dice-server"
      OTEL_SERVICE_VERSION: "0.1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_METRIC_EXPORT_INTERVAL: "5000"
      MIX_ENV: dev
      PHX_SERVER: true
      # JSON_LOGGER: "true" # Uncomment to enable JSON logs in dev console, in addition to file based logging
      ERL_AFLAGS: -kernel shell_history enabled
      DB_HOST: db
    ports:
      - "4000:4000"
      - "9568:9568" # Prometheus metrics endpoint
    volumes:
      - .:/app
      - ./log:/app/log
      # Use anonymous volumes to protect container's compiled dependencies
      - /app/_build
      - /app/deps
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elixir_phx_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  traffic:
    image: curlimages/curl:8.10.1
    environment:
      SLEEP_INTERVAL: "5" # seconds to wait between requests
    volumes:
      - ./generate-traffic.sh:/generate-traffic.sh:ro
    command: ["sh", "/generate-traffic.sh"]
    depends_on:
      - app

  lgtm:
    image: docker.io/grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3000:3000"
      - "4040:4040"
      - "4317:4317"
      - "4318:4318"
      - "9090:9090"
    volumes:
      - ../../container/grafana:/data/grafana
      - ../../container/prometheus:/data/prometheus
      - ../../container/loki:/data/loki
      - ../../container/tempo:/data/tempo
      - ../../docker/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml
      - ../../docker/otelcol-config-export-http.yaml:/otel-lgtm/otelcol-config-export-http.yaml
      - ../../docker/grafana-datasources.yaml:/data/grafana/provisioning/datasources/datasources.yaml:ro
      - ./log:/var/log/elixir_phx:ro
    env_file:
      - .env.lgtm
    environment:
      - GF_PATHS_DATA=/data/grafana
      - GF_PATHS_LOGS=/data/grafana/log
      - GF_PATHS_PLUGINS=/data/grafana/plugins
      - GF_PATHS_PROVISIONING=/data/grafana/provisioning
      - OTEL_NODE_DISABLED_INSTRUMENTATIONS="fs,dns" # TODO: test blacklisting

volumes:
  postgres_data:
