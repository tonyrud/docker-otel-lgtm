---
services:
  # WIP: only using regular mix app at this time!!
  elixir_phx:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      OTEL_SERVICE_NAME: "elixir-phx-dice-server"
      OTEL_SERVICE_VERSION: "0.1.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_METRIC_EXPORT_INTERVAL: "5000" # so we don't have to wait 60s for metrics
      MIX_ENV: dev
      PHX_SERVER: true
      JSON_LOGGER: "true"
      ERL_AFLAGS: -kernel shell_history enabled
      DB_HOST: db
      # Database is optional for this example, but keeping for completeness
      # DATABASE_URL: ecto://postgres:postgres@db:5432/elixir_phx_dev
    ports:
      - "4000:4000"
    volumes:
      - ./log:/app/log
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elixir_phx_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  traffic:
    image: curlimages/curl:8.10.1
    environment:
      SLEEP_INTERVAL: "5" # seconds to wait between requests
    volumes:
      - ./generate-traffic.sh:/generate-traffic.sh:ro
    command: ["sh", "/generate-traffic.sh"]

volumes:
  postgres_data:
